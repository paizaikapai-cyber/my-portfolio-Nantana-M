<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminar & Poster - Nantana Monkata</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #F8F9FA; color: #2D3436; }
        
        .title-box {
            display: inline-flex;
            align-items: center;
            background-color: #4A90E2; 
            color: white !important;
            padding: 8px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.2);
        }

        .accordion-btn {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid #E2E8F0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .accordion-btn:hover {
            border-color: #4A90E2;
            background-color: #F0F7FF;
        }

        .pdf-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            background: white;
            border-radius: 0 0 16px 16px;
        }

        .pdf-content.active {
            max-height: 2500px; 
            margin-top: -10px;
            padding-top: 20px;
            border: 1px solid #E2E8F0;
            border-top: none;
        }

        /* สัดส่วนสไลด์ MacBook (16:10) */
        .slide-viewer {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #f1f5f9;
            border-radius: 12px;
            overflow: hidden;
        }

        /* สัดส่วน Poster แนวตั้ง (A4/A0) */
        .poster-viewer {
            width: 100%;
            aspect-ratio: 1 / 1.414;
            background: #f1f5f9;
            border-radius: 12px;
            overflow: hidden;
        }

        .view-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #4A90E2;
            color: white;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 15px;
            float: right;
        }

        .view-btn:hover {
            background-color: #357ABD;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }

        .pdf-content::after {
            content: "";
            display: table;
            clear: both;
        }

        iframe { width: 100%; height: 100%; border: none; }
        .icon-rotate { transition: transform 0.3s ease; }
        .active .icon-rotate { transform: rotate(180deg); }


/* --- 1. สำหรับมือถือ (iPhone/Android) --- */
/* เขียน Style ปกติที่นี่ ทุกอย่างจะเป็นแบบแนวตั้ง (Stack) */
.container {
    width: 100%;
    padding: 15px;
    display: flex;
    flex-direction: column; /* เรียงลงมาเป็นแถวเดียว */
}

/* --- 2. สำหรับ Tablet (iPad) --- */
/* เมื่อหน้าจอกว้างตั้งแต่ 768px ขึ้นไป */
@media (min-width: 768px) {
    .container {
        flex-direction: row; /* เริ่มเรียงเป็นแนวนอน */
        flex-wrap: wrap;
    }
    .item {
        width: 50%; /* แบ่งเป็น 2 คอลัมน์ */
    }
}

/* --- 3. สำหรับ Laptop/Mac (Desktop) --- */
/* เมื่อหน้าจอกว้างตั้งแต่ 1024px ขึ้นไป */
@media (min-width: 1024px) {
    .container {
        max-width: 1200px; /* จำกัดความกว้างไม่ให้บานเต็มจอเกินไป */
        margin: 0 auto;    /* จัดกึ่งกลางหน้าจอ */
    }
    .item {
        width: 33.33%; /* แบ่งเป็น 3 คอลัมน์ */
    }
}

.img {
    max-width: 100%;
    height: auto;
    display: block;
}
    </style>
</head>
<body class="p-6 md:p-10 lg:px-20 lg:py-12">

    <div class="fixed top-6 left-6 z-50">

            <span class="material-symbols-outlined text-xl">home</span>

                <div class="accordion-item">

                            <span class="material-symbols-outlined text-sm">open_in_new</span> View Full PDF

                <div class="accordion-item">
                    <button class="accordion-btn" onclick="togglePDF('slide4')">

                        </div>
                        <span class="material-symbols-outlined icon-rotate text-gray-400">expand_more</span>
                    </button>
                    <div id="slide4" class="pdf-content px-5 pb-5">
                        <div class="slide-viewer">
                            <iframe src="slide4.pdf#view=FitH"></iframe>
                        </div>
                        <a href="slide4.pdf" target="_blank" class="view-btn">
                            <span class="material-symbols-outlined text-sm">open_in_new</span> View Full PDF
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-10">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                <span class="material-symbols-outlined text-blue-500">filter_frames</span> Research Posters
            </h2>

            <div class="space-y-4">
                <div class="accordion-item">
                    <button class="accordion-btn" onclick="togglePDF('poster1')">
                        <div class="text-left">
                            <span class="block font-semibold text-gray-800 text-base leading-tight">Poster: Heavy-Quark Spin Symmetry Violation Effects in Charmed Baryon Production</span>
                            <span class="block font-normal text-gray-400 text-sm mt-1">@SNP International School for Strangeness Nuclear Physics, Japan</span>

                        <span class="material-symbols-outlined icon-rotate text-gray-400">expand_more</span>

                    <div id="poster1" class="pdf-content px-5 pb-5">

                        <a href="poster1.pdf" target="_blank" class="view-btn">
                            <span class="material-symbols-outlined text-sm">open_in_new</span> View Full PDF
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        function togglePDF(id) {
            const content = document.getElementById(id);
            const btn = content.parentElement.querySelector('.accordion-btn');
            content.classList.toggle('active');
            btn.classList.toggle('active');
        }
    </script>

 <footer class="text-center py-8 text-gray-400 text-xs">
